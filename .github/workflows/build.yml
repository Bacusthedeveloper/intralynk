name: Build IntraLynk APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # lets you trigger it manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            openjdk-17-jdk \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            cmake

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer
          pip install cython==0.29.33

      - name: Set up Android SDK/NDK via buildozer
        run: |
          buildozer android debug 2>&1 | head -5 || true
    
      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true
          yes | sdkmanager "build-tools;33.0.2" "platforms;android-33" || true

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IntraLynk-debug
          path: bin/*.apk
          if-no-files-found: error
